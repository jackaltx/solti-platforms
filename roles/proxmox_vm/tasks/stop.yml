---
# Stop VM (hard stop - non-graceful)

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - vm_vmid is defined
    fail_msg: "vm_vmid is required for stop action"

- name: Stop VM {{ vm_vmid }}
  ansible.builtin.command:
    cmd: "qm stop {{ vm_vmid }}"
  become: true
  register: stop_result
  changed_when: stop_result.rc == 0
  failed_when: false

- name: Display stop result
  ansible.builtin.debug:
    msg: "{{ 'VM ' + (vm_vmid | string) + ' stopped successfully' if stop_result.rc == 0 else 'VM ' + (vm_vmid | string) + ' already stopped or stop failed: ' + stop_result.stderr }}"
