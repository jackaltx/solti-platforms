---
# proxmox_vm role - Manage Proxmox VM lifecycle
#
# States (Phase 1 - Debian only):
#   create: Clone VM from template, resize disk, configure cloud-init
#   verify: Check VM exists and display configuration
#
# Future states:
#   start:    Boot VM
#   stop:     Stop VM (non-graceful)
#   shutdown: Graceful shutdown
#   remove:   Destroy VM
#   modify:   Change VM properties (resize disk, network, etc.)
#   status:   Get VM status details

- name: Load distribution-specific variables
  ansible.builtin.include_vars:
    file: debian12.yml

- name: Validate required variables for create state
  ansible.builtin.assert:
    that:
      - vm_vmid is defined
      - vm_name is defined
    fail_msg: "Required variables vm_vmid and vm_name must be defined for create state"
  when: vm_state == 'create'

- name: Validate required variables for verify state
  ansible.builtin.assert:
    that:
      - vm_vmid is defined
    fail_msg: "Required variable vm_vmid must be defined for verify state"
  when: vm_state == 'verify'

- name: Execute create tasks
  ansible.builtin.include_tasks:
    file: create.yml
  when: vm_state == 'create'

- name: Execute verify tasks
  ansible.builtin.include_tasks:
    file: verify.yml
  when: vm_state == 'verify'

- name: Unsupported state
  ansible.builtin.fail:
    msg: "Unsupported vm_state: {{ vm_state }}. Supported states: create, verify"
  when: vm_state not in ['create', 'verify']
