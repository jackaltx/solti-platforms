---
# Configure cloud-init to install qemu-guest-agent on first boot
# This is more portable than virt-customize and works reliably across all distros

- name: Display guest agent installation method
  ansible.builtin.debug:
    msg:
      - "Guest agent will be installed via cloud-init on first VM boot"
      - "Package: {{ template_guest_agent_package }}"
      - "This is configured in the VM's cloud-init settings"
