---
# Platform inventory for solti-platforms collection
# Used by manage-platform.sh and platform-exec.sh
#
# RADICAL SIMPLIFICATION PATTERN:
# - Flat host list with per-host configuration
# - No capability groups - direct host targeting required
# - All host-specific config in host_vars/{hostname}.yml
# - Single unified VMID range (9000-9999) for all templates

all:
  vars:
    # ============================================
    # Shared Core Variables (sync with solti-containers)
    # These vars are consistent across all SOLTI collections
    # ============================================
    domain: a0a0.org
    mylab_nolog: "{{ cluster_secure_log | bool | default(true) }}"  # Controls debug output
    ansible_user: lavender                                           # Used by Proxmox cloud-init
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519                 # Used by Proxmox cloud-init
    mylab_non_ssh: false                                            # LXC container flag

  children:
    # ============================================
    # Proxmox Hosts
    # All Proxmox servers/clusters go here
    # Use host_vars/{hostname}.yml for per-host config overrides
    # ============================================
    proxmox_hosts:
      hosts:
        magic:
          ansible_host: magic.{{ domain }}
          # Add more Proxmox hosts:
          # proxmox2:
          #   ansible_host: proxmox2.{{ domain }}
          # cluster5_node1:
          #   ansible_host: pve1.cluster5.{{ domain }}

      vars:
        # ========================================
        # Common Defaults for ALL Proxmox Hosts
        # Override in host_vars/{hostname}.yml if needed
        # ========================================

        # Proxmox configuration
        # Note: pvesh/qm require root. User needs passwordless sudo configured:
        # Run: ssh root@magic "bash -s" < docs/setup-passwordless-sudo.sh
        proxmox_storage: local-lvm
        proxmox_bridge: vmbr0

        # Template creation settings
        template_memory: 4096              # RAM in MB
        template_cores: 4                  # CPU cores
        template_disk_size: 8G             # Disk size
        template_work_dir: /opt/solti/qcow
        template_cleanup: false

        # ========================================
        # UNIFIED VMID RANGE
        # All templates use 9000-9999 range (100 slots)
        # No more per-distribution ranges
        # ========================================
        template_vmid_base: 9000           # First VMID for templates
        template_vmid_max: 9999            # Last VMID for templates
